<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Middle East Conflict Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- Leaflet MarkerCluster (for clustering) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"
  />

  <!-- Your styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Middle East Escalation Map</h2>

  <!-- Optional: this dropdown is harmless to keep, but the current script.js
       I gave you doesn't use it yet. We can wire it up next if you want. -->
  <select id="actorFilter">
    <option value="All">All Actors</option>
    <option value="Israel">Israel</option>
    <option value="Iran">Iran</option>
    <option value="US">US</option>
    <option value="Proxy">Proxy</option>
    <option value="Other">Other</option>
  </select>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- MarkerCluster JS (must be after Leaflet, before script.js) -->
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- Your app logic -->
  <script src="script.js"></script>

</body>
</html>
